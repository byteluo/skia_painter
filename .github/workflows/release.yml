name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag (e.g. v0.1.0)'
        required: false
        default: ''

permissions:
  contents: write

env:
  SKIA_COMMIT: 6c7fd08b91efe0fa97a39474d7e4ca90807384ec

jobs:
  # ---------------------------------------------------------------------------
  # macOS build (native, ARM64)
  # ---------------------------------------------------------------------------
  build-macos:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Checkout Skia submodule
        run: |
          rm -rf third_party/skia
          git clone --filter=blob:none --no-checkout \
            https://skia.googlesource.com/skia.git third_party/skia
          git -C third_party/skia checkout ${{ env.SKIA_COMMIT }}

      - name: Install Homebrew dependencies
        run: |
          brew install cmake ninja v8 libpng freetype zlib pkgconf openjdk bazel@8

      - name: Set up Java
        run: |
          JAVA_HOME="$(brew --prefix openjdk)/libexec/openjdk.jdk/Contents/Home"
          echo "JAVA_HOME=${JAVA_HOME}" >> "$GITHUB_ENV"
          echo "${JAVA_HOME}/bin" >> "$GITHUB_PATH"

      - name: Cache Bazel output root
        uses: actions/cache@v4
        with:
          path: build/bazel-root
          key: bazel-${{ runner.os }}-${{ runner.arch }}-${{ env.SKIA_COMMIT }}-v1

      - name: Build Skia (minimal)
        working-directory: third_party/skia
        run: |
          BAZEL="$(brew --prefix bazel@8)/libexec/bin/bazel-real"
          "${BAZEL}" --batch --noworkspace_rc \
            --output_user_root="${GITHUB_WORKSPACE}/build/bazel-root" \
            build //:core //src/base:base //modules/skcms:skcms

      - name: Install npm dependencies
        run: npm ci || npm install

      - name: Build canvas_engine
        run: |
          cmake --preset release
          cmake --build --preset release

      - name: Run tests
        run: ctest --preset release --output-on-failure

      - name: Generate all PNGs
        run: |
          mkdir -p output
          for script in examples/*.js; do
            echo "Rendering: ${script}"
            ./build/release/canvas_engine "${script}" || echo "Warning: ${script} failed"
          done

      - name: Package macOS binary
        run: |
          mkdir -p dist
          cp build/release/canvas_engine dist/canvas_engine-macos-arm64
          chmod +x dist/canvas_engine-macos-arm64
          tar czf dist/canvas_engine-macos-arm64.tar.gz -C dist canvas_engine-macos-arm64

      - name: Upload macOS binary
        uses: actions/upload-artifact@v4
        with:
          name: canvas_engine-macos-arm64
          path: dist/canvas_engine-macos-arm64.tar.gz

      - name: Upload generated PNGs
        uses: actions/upload-artifact@v4
        with:
          name: output-pngs
          path: output/*.png

  # ---------------------------------------------------------------------------
  # Linux build (Docker, x86_64)
  # ---------------------------------------------------------------------------
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout Skia submodule
        run: |
          rm -rf third_party/skia
          git clone --filter=blob:none --no-checkout \
            https://skia.googlesource.com/skia.git third_party/skia
          git -C third_party/skia checkout ${{ env.SKIA_COMMIT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build the v8-builder stage first with its own cache scope so the
      # ~60 min V8 compile is preserved even if project code changes invalidate
      # later stages.
      - name: Build v8-builder stage (cached)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: v8-builder
          load: false
          cache-from: type=gha,scope=v8
          cache-to: type=gha,mode=max,scope=v8

      - name: Build skia-builder stage (cached)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: skia-builder
          load: false
          cache-from: |
            type=gha,scope=v8
            type=gha,scope=skia
          cache-to: type=gha,mode=max,scope=skia

      - name: Build canvas_engine (project-builder)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: project-builder
          load: true
          tags: skia-painter-build:latest
          cache-from: |
            type=gha,scope=v8
            type=gha,scope=skia
            type=gha,scope=project
          cache-to: type=gha,mode=max,scope=project

      - name: Extract Linux binary
        run: |
          mkdir -p dist
          CONTAINER_ID=$(docker create skia-painter-build:latest)
          docker cp "${CONTAINER_ID}:/src/build/release/canvas_engine" dist/canvas_engine-linux-x64
          docker rm "${CONTAINER_ID}"
          chmod +x dist/canvas_engine-linux-x64
          tar czf dist/canvas_engine-linux-x64.tar.gz -C dist canvas_engine-linux-x64

      - name: Upload Linux binary
        uses: actions/upload-artifact@v4
        with:
          name: canvas_engine-linux-x64
          path: dist/canvas_engine-linux-x64.tar.gz

  # ---------------------------------------------------------------------------
  # Create GitHub Release (only on tag push)
  # ---------------------------------------------------------------------------
  release:
    needs: [build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.tag_name != ''
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Determine tag
        id: tag
        run: |
          if [[ "${{ github.event.inputs.tag_name }}" != "" ]]; then
            echo "name=${{ github.event.inputs.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/canvas_engine-macos-arm64/canvas_engine-macos-arm64.tar.gz
            artifacts/canvas_engine-linux-x64/canvas_engine-linux-x64.tar.gz
