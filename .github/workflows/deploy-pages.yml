name: Deploy Demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate pre-generated PNGs
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          cases = json.load(open("web/compare/cases.json"))
          missing = [
              case["outputFile"]
              for case in cases
              if not Path(case["outputFile"]).is_file()
          ]
          if missing:
              print("Missing pre-generated PNGs:")
              for path in missing:
                  print(f"  {path}")
              raise SystemExit(1)
          print(f"Validated {len(cases)} pre-generated PNGs")
          PY

      - name: Build static site
        run: bash scripts/build_pages.sh

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
