name: Deploy Compare Lab

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install npm dependencies
        run: npm ci || npm install

      - name: Assemble site
        run: |
          mkdir -p _site/output
          cp web/compare/index.html _site/
          cp web/compare/app.js     _site/
          cp web/compare/styles.css _site/
          cp web/compare/cases.json _site/
          cp node_modules/echarts/dist/echarts.js _site/echarts.js
          cp output/*.png _site/output/ 2>/dev/null || echo "No PNGs in output/ yet"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
